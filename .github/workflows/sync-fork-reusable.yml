name: Sync fork (reusable)

on:
  workflow_call:
    secrets:
      SYNC_COMMIT_NAME:
        required: true
        description: Nome do autor do commit (conta GitHub ligada à Vercel)
      SYNC_COMMIT_EMAIL:
        required: true
        description: E-mail do autor do commit (mesma conta GitHub da Vercel)
      SYNC_COMMIT_TOKEN:
        required: false
        description: PAT opcional do owner (contents write no fork) se push com GITHUB_TOKEN não disparar deploy na Vercel
    inputs:
      upstream_repo:
        description: "owner/repo do upstream público (default joaop06/vina)"
        required: false
        type: string
        default: joaop06/vina
      upstream_branch:
        description: Branch do upstream a sincronizar
        required: false
        type: string
        default: main
      target_branch:
        description: Branch do fork que recebe a sync
        required: false
        type: string
        default: main

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: Configurar Git (autor reconhecido pela Vercel)
        env:
          SYNC_COMMIT_NAME: ${{ secrets.SYNC_COMMIT_NAME }}
          SYNC_COMMIT_EMAIL: ${{ secrets.SYNC_COMMIT_EMAIL }}
        run: |
          if [ -z "$SYNC_COMMIT_NAME" ] || [ -z "$SYNC_COMMIT_EMAIL" ]; then
            echo "Defina os secrets SYNC_COMMIT_NAME e SYNC_COMMIT_EMAIL no fork (conta GitHub do projeto na Vercel)."
            exit 1
          fi
          git config user.name "$SYNC_COMMIT_NAME"
          git config user.email "$SYNC_COMMIT_EMAIL"

      - name: Fetch upstream
        env:
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          UPSTREAM_BRANCH: ${{ inputs.upstream_branch }}
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "${UPSTREAM_BRANCH}"
          git branch -f upstream-sync-ref "upstream/${UPSTREAM_BRANCH}"

      - name: Merge inteligente (3-vias)
        id: merge
        env:
          UPSTREAM_REF: upstream-sync-ref
          SYNC_CONFLICT_BRANCH: sync/upstream-${{ github.run_id }}
        run: |
          before=$(git rev-parse HEAD)
          set +e
          node scripts/sync-upstream-merge.mjs
          code=$?
          set -e
          after=$(git rev-parse HEAD)
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$before" != "$after" ]; then
            echo "new_commit=true" >> "$GITHUB_OUTPUT"
          fi
          if [ "$code" -eq 1 ]; then
            echo "partial_or_conflict=true" >> "$GITHUB_OUTPUT"
          elif [ "$code" -ne 0 ]; then
            exit "$code"
          fi

      - name: Validar build
        if: steps.merge.outputs.exit_code == '0' && steps.merge.outputs.new_commit == 'true'
        env:
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin123
          JWT_SECRET: ci-secret-change-me-min-32-chars-long!!
          DATA_BACKEND: fs
          NEXT_PUBLIC_SITE_URL: https://example.com
        run: |
          npm ci
          npm run lint
          npm test
          npm run indices:validate -- --data=data
          npm run build

      - name: Push main
        if: steps.merge.outputs.exit_code == '0' && steps.merge.outputs.new_commit == 'true'
        env:
          SYNC_COMMIT_TOKEN: ${{ secrets.SYNC_COMMIT_TOKEN }}
        run: |
          if [ -n "$SYNC_COMMIT_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${SYNC_COMMIT_TOKEN}@github.com/${{ github.repository }}.git"
          fi
          git push origin "HEAD:${{ inputs.target_branch }}"

      - name: Push branch de sync parcial
        if: steps.merge.outputs.partial_or_conflict == 'true'
        env:
          SYNC_CONFLICT_BRANCH: sync/upstream-${{ github.run_id }}
          SYNC_COMMIT_TOKEN: ${{ secrets.SYNC_COMMIT_TOKEN }}
        run: |
          if [ -n "$SYNC_COMMIT_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${SYNC_COMMIT_TOKEN}@github.com/${{ github.repository }}.git"
          fi
          git push -u origin "HEAD:${SYNC_CONFLICT_BRANCH}"

      - name: Abrir PR (conflitos ou sync parcial)
        if: steps.merge.outputs.partial_or_conflict == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_CONFLICT_BRANCH: sync/upstream-${{ github.run_id }}
        run: |
          existing=$(gh pr list --head "${SYNC_CONFLICT_BRANCH}" --base "${{ inputs.target_branch }}" --json number --jq 'length')
          if [ "$existing" -gt 0 ]; then
            echo "PR já existe para ${SYNC_CONFLICT_BRANCH}"
            exit 0
          fi
          gh pr create \
            --base "${{ inputs.target_branch }}" \
            --head "${SYNC_CONFLICT_BRANCH}" \
            --title "Sync upstream (${{ inputs.upstream_repo }})" \
            --body "$(cat <<'EOF'
          ## Sincronização com upstream

          O sync automático trouxe as mudanças do upstream que **não conflitam** com alterações desta loja.

          Alguns arquivos foram alterados **tanto aqui quanto no upstream** e precisam de revisão manual. Veja a mensagem do último commit nesta branch para a lista.

          ### O que fazer
          1. Revise os arquivos listados no commit.
          2. Mescle as mudanças do upstream onde fizer sentido.
          3. **Merge** deste PR na branch principal → dispara o deploy.

          Se precisar de ajuda, contate quem mantém o catálogo base.
          EOF
          )"
