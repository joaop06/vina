name: Data indices

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "scripts/rebuild-product-indices.ts"
      - "src/lib/indices/**"
      - "src/schemas/product-index.ts"
      - "src/schemas/order-index.ts"
      - "src/schemas/client-index.ts"
      - "src/schemas/dashboard-catalog-index.ts"
concurrency:
  group: data-indices-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate indices (data/)
        run: npm run indices:validate -- --data=data

  repair:
    needs: validate
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Repair indices (filesystem)
        run: npm run indices:repair -- --data=data

      - name: Commit and push (if changed)
        env:
          SYNC_COMMIT_NAME: ${{ secrets.SYNC_COMMIT_NAME }}
          SYNC_COMMIT_EMAIL: ${{ secrets.SYNC_COMMIT_EMAIL }}
          SYNC_COMMIT_TOKEN: ${{ secrets.SYNC_COMMIT_TOKEN }}
        run: |
          if [ -n "$SYNC_COMMIT_NAME" ] && [ -n "$SYNC_COMMIT_EMAIL" ]; then
            git config user.name "$SYNC_COMMIT_NAME"
            git config user.email "$SYNC_COMMIT_EMAIL"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          fi
          git add data/indices
          if git diff --staged --quiet; then
            echo "Indices repair produced no file changes; validate may have failed for another reason."
            exit 1
          fi
          git commit -m "fix(data): repair indices from entity JSON"
          if [ -n "$SYNC_COMMIT_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${SYNC_COMMIT_TOKEN}@github.com/${{ github.repository }}.git"
          fi
          git push
